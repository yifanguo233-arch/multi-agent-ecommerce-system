services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: multi-agent-ecommerce-api:local
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      ECOM_DATABASE_URL: postgresql+psycopg://ecommerce:ecommerce@postgres:5432/ecommerce
      ECOM_REDIS_URL: redis://redis:6379/0
      ECOM_PRODUCT_AUTO_SEED: "true"
      ECOM_PRODUCT_SEED_COUNT: "240"
      ECOM_PRODUCT_CATALOG_CACHE_LIMIT: "500"
      ECOM_ORCHESTRATION_MODE: ${ECOM_ORCHESTRATION_MODE:-graph}
      ECOM_AB_TEST_ENABLED: ${ECOM_AB_TEST_ENABLED:-true}
      ECOM_LLM_API_KEY: ${ECOM_LLM_API_KEY:-}
      ECOM_LLM_BASE_URL: ${ECOM_LLM_BASE_URL:-https://api.minimaxi.com/v1}
      ECOM_LLM_MODEL: ${ECOM_LLM_MODEL:-MiniMax-M2.7}
      ECOM_PLANNER_USE_LLM: ${ECOM_PLANNER_USE_LLM:-false}
      ECOM_PLANNER_LLM_TIMEOUT_SECONDS: ${ECOM_PLANNER_LLM_TIMEOUT_SECONDS:-30}
      ECOM_AGENT_TIMEOUT_PLANNER: ${ECOM_AGENT_TIMEOUT_PLANNER:-35}
      ECOM_PLANNER_LLM_MAX_TOKENS: ${ECOM_PLANNER_LLM_MAX_TOKENS:-768}
      ECOM_RAG_ENABLED: ${ECOM_RAG_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
